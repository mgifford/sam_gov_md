name: Accessibility Scan (axe-core)

# Run monthly, on every push that touches dashboard pages, and on demand.
#
# Token requirements:
#   The built-in GITHUB_TOKEN is sufficient for scanning and filing issues when
#   the job-level permissions below include issues: write and pull-requests: write.
#
#   If you want GitHub Copilot to be automatically assigned to fix the issues
#   (skip_copilot_assignment: false), you MAY need a fine-grained Personal Access
#   Token (PAT).  If so, add a repository secret named GH_TOKEN with these
#   permissions on this repository:
#     contents: write
#     issues: write
#     pull-requests: write
#     metadata: read (automatically granted)
#
#   When GH_TOKEN is not set the workflow falls back to the built-in GITHUB_TOKEN.

on:
  schedule:
    - cron: '0 10 1 * *'  # 1st of every month at 10:00 UTC
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/a11y-scan.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  a11y:
    name: axe-core accessibility scan
    runs-on: ubuntu-latest

    steps:
      - name: Scan GitHub Pages for accessibility issues
        uses: github/accessibility-scanner@v2
        with:
          # Public GitHub Pages URLs for this project
          urls: |
            https://mgifford.github.io/sam_gov_md/
            https://mgifford.github.io/sam_gov_md/search.html
            https://mgifford.github.io/sam_gov_md/trends.html
          # Repository where issues will be filed (and where Copilot will open PRs)
          repository: mgifford/sam_gov_md
          # Use a PAT (GH_TOKEN) if available; fall back to the built-in token.
          # See the comment at the top of this file for when a PAT is needed.
          token: ${{ secrets.GH_TOKEN || github.token }}
          # Cache key used to deduplicate findings across runs
          cache_key: mgifford-sam_gov_md-a11y
          # Set to true if GitHub Copilot is not available in this repository
          skip_copilot_assignment: false
          # Capture screenshots and attach links to filed issues
          include_screenshots: true
          # Group all violations from a single run into one summary issue
          open_grouped_issues: true
