name: Weekly historical rebuild

on:
  workflow_dispatch:
  schedule:
    - cron: '15 11 * * 1'

permissions:
  contents: write

concurrency:
  group: sam-gov-weekly-historical
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright pyyaml
          python -m playwright install chromium

      - name: Refresh historical samples
        run: |
          python scripts/explore_extracts.py \
            --limit 25 \
            --records 1 \
            --save-sample data/samples_json \
            --save-md data/samples_md \
            --report data/samples_report.json

      - name: Rebuild term scan + top matches
        run: |
          python scripts/scan_terms.py \
            --md-dir data/samples_md \
            --terms config/terms.yml \
            --output data/term_scan_report.json
          python scripts/analyze_matches.py

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain -- data/samples_json data/samples_md data/samples_report.json data/term_scan_report.json data/top_matches_report.md)" ]]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/samples_json data/samples_md data/samples_report.json data/term_scan_report.json data/top_matches_report.md
          git commit -m "chore: weekly historical rebuild ($(date -u +%F))"
          git push
