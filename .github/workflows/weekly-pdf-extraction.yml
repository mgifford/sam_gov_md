name: Weekly PDF extraction

on:
  workflow_dispatch:
  schedule:
    - cron: '15 11 * * 1'  # Monday 11:15 AM UTC

permissions:
  contents: write

concurrency:
  group: sam-gov-weekly-pdf
  cancel-in-progress: false

jobs:
  extract_pdfs:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml pdfplumber python-docx beautifulsoup4 lxml

      - name: Download latest CSV
        run: |
          python scripts/download_csv.py

      - name: Process latest opportunities and wins
        run: |
          TARGET_DATE=$(TZ=America/New_York date +%F)
          echo "TARGET_DATE=$TARGET_DATE"
          python scripts/process_today.py \
            --target-date "$TARGET_DATE" \
            --fallback-latest \
            --source-url data/ContractOpportunitiesFullCSV.csv

      - name: Persist and deduplicate snapshot
        run: |
          python scripts/persist_to_sqlite.py

      - name: Build high-value alerts
        run: |
          python scripts/generate_alerts.py --min-hits 8

      - name: Export department trends
        run: |
          python scripts/export_trends.py

      - name: Export all opportunities for search
        run: |
          python scripts/export_all_opportunities.py

      - name: Extract PDFs from opportunities
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: |
          # Extract PDFs for top 50 opportunities (~10-15 with valid PDFs)
          # --save-pdf stores the raw PDF alongside the extracted markdown
          # --api-key uses SAM_API_KEY env var (falls back to DEMO_KEY if unset)
          python scripts/scrape_opportunities.py \
            --limit 50 \
            --csv data/ContractOpportunitiesFullCSV.csv \
            --save-pdf \
            --api-key "${SAM_API_KEY:-DEMO_KEY}"

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain -- data/ContractOpportunitiesFullCSV.csv data/today docs/data docs/opportunities data/opportunities.sqlite)" ]]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ContractOpportunitiesFullCSV.csv data/today docs/data docs/opportunities data/opportunities.sqlite
          git commit -m "chore: weekly PDF extraction and CSV refresh ($(date -u +%F))"
          git push
