title: SAM.gov Contract Opportunities
description: Search digital service keywords across SAM.gov contract opportunities
url: https://mgifford.github.io/sam_gov_md
baseurl: /sam_gov_md

# Jekyll settings for proper markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Permalink structure - ensures .md files become .html in the output
permalink: /:path/
collections_dir: .

# Process future posts/pages
future: true

# Exclude certain files/folders from Jekyll processing
exclude:
  - node_modules
  - .git
  - .gitignore
  - README.md
  - Gemfile
  - Gemfile.lock

# Include hidden files that should be processed
include:
  - _layouts

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
